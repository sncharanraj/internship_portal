apiVersion: apps/v1
kind: Deployment
metadata:
  name: internship-frontend
  labels:
    app: internship-frontend
spec:
  replicas: 2  # Run 2 copies of frontend
  selector:
    matchLabels:
      app: internship-frontend
  template:
    metadata:
      labels:
        app: internship-frontend
    spec:
      containers:
      - name: frontend
        image: internship-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: internship-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer  # Expose to outside
