apiVersion: apps/v1
kind: Deployment
metadata:
  name: internship-backend
  labels:
    app: internship-backend
spec:
  replicas: 3  # Run 3 copies of your backend
  selector:
    matchLabels:
      app: internship-backend
  template:
    metadata:
      labels:
        app: internship-backend
    spec:
      containers:
      - name: backend
        image: internship-backend:latest
        imagePullPolicy: Never  # Use local image
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: mongodb-uri
        - name: BREVO_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: brevo-api-key
        - name: ADMIN_EMAIL
          value: "charanka21@gmail.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: internship-backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP
